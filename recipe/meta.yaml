{% set name = "datacompy" %}
{% set version = "0.19.2" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a4bbd6357503a30f58038f64d4dbba2f30b1c2c04f5e535d3460f4192e55697f

build:
  noarch: python
  number: 0
  script: '{{ PYTHON }} -m pip install . -vv '

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - pandas <=2.3.3,>=2.2
    - numpy <=2.3.5,>=1.26
    - ordered-set <=4.1,>=4.0.2
    - polars[pandas] <=1.36.1,>=0.20.4
    - Jinja2 >=3.0.0
    - python >={{ python_min }}


test:
  requires:
    - python {{ python_min }}
  imports:
    - datacompy

about:
  home: https://github.com/capitalone/datacompy
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Pandas and Spark DataFrame comparison for humans

extra:
  recipe-maintainers:
    - rhaffar
    - jdawang
    - gladysteh99
    - fdosani
    - ak-gupta
